# Multi-shape assembly task config
# Board top z = 0.280 + 0.030 = 0.310 m
# Table top z = 0.125 + 0.125 = 0.250 m

peg:  # default (round peg); set_peg_half_length() overrides per sub-task
  radius: 0.010
  half_length: 0.070
  mass: 0.100

board:
  center: [0.55, 0.10, 0.280]       # matches scene.yaml assembly_board.center
  half_size: [0.100, 0.060, 0.030]  # board_top_z = 0.310 (used by OCP clearance metric)
  hole_radius: 0.014                 # round_hole radius (used by LCS clearance computation)

robot:
  base_pos: [0.0, 0.0, 0.0]
  home_qpos: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]
  gripper_open_ctrl: 255.0
  gripper_close_ctrl: 76.0

stages:
  pregrasp_z_offset: 0.10           # m above peg top for pregrasp approach
  lift_z: 0.55                       # world z after lifting peg (above max pregrasp 0.490 m)
  preinsert_z_offset: 0.10          # m above hole entrance for preinsert
  insertion_depth_goal: 0.045       # peg tip must go this far below hole entrance
  insert_descend_speed: 0.008       # m/s during insertion descent
  align_xy_tol: 0.002               # m, XY tolerance before insertion
  pos_tol: 0.005                    # m, general position tolerance for stage transitions
  rot_tol: 0.05                     # rad, general rotation tolerance
  max_force_abort: 40.0             # N, abort if contact force exceeds this
  stage_timeout: [12.0, 6.0, 6.0, 12.0, 6.0, 120.0, 6.0, 6.0]  # s per stage

contact_recovery:
  enabled: true
  lateral_force_threshold: 1.5
  jam_window_steps: 50
  retract_height: 0.003
  max_attempts: 8

sim:
  dt: 0.002
  render_fps: 30

osc:
  enabled: true              # Operational-space controller (requires os_ctrl passed to MultiTaskAssemblyTask)


preinsert_ocp:
  enabled: true              # EE-space pre-insertion OCP
  ocp:
    horizon: 30
    dt: 0.10
    v_max: [0.15, 0.15, 0.10]
    Q_terminal: 2000.0
    Q_vel: 0.5
    Q_smooth: 5.0
    w_clearance: 500.0
    w_workspace: 100.0
    eps_terminal: 0.005
    clearance_lateral_threshold: 0.05
    workspace:
      x_min: -0.80
      x_max:  0.80
      y_min: -0.50
      y_max:  0.80
      z_min:  0.35
      z_max:  0.80

lcs_mpc:
  enabled: true              # Reduced LCS-MPC force feedforward for insertion
  mpc_max_failures: 10
  lcs_model:
    eff_mass: 0.5
    damping: 8.0
    damping_z: 12.0
    dt: 0.02
  mpc:
    horizon: 8
    Q_lat: 500.0
    Q_z: 200.0
    Q_vel: 1.0
    R_u: 0.01
    Q_N_scale: 5.0
    u_max: [5.0, 5.0, 10.0]
    u_min: [-5.0, -5.0, 0.5]
    mpc_freq_ratio: 10
