position_controller:
  # Cartesian resolved-motion-rate control (velocity-based IK)
  kp_pos: 20.0         # task-space position gain (1/s)
  kp_rot: 5.0          # task-space rotation gain (1/s)
  damping: 0.01        # Jacobian damping (λ for damped pseudo-inverse)
  max_cart_vel: 0.25   # m/s clamp on Cartesian velocity command
  max_joint_vel: 2.0   # rad/s clamp on joint velocity
  lookahead: 0.30      # s: ctrl = q + dq*lookahead so Panda servo gets enough error

impedance_controller:
  # During free-space approach: stiff position tracking
  kp_pos_free: [300.0, 300.0, 300.0]    # N/m
  kd_pos_free: [30.0, 30.0, 30.0]       # N·s/m
  kp_rot_free: [30.0, 30.0, 30.0]       # N·m/rad
  kd_rot_free: [3.0, 3.0, 3.0]

  # During insertion: compliant x/y, downward z force
  kp_pos_insert: [80.0, 80.0, 50.0]     # low x/y, z pushes forward
  kd_pos_insert: [15.0, 15.0, 10.0]
  kp_rot_insert: [10.0, 10.0, 20.0]     # allow x/y tilt, resist z rotation
  kd_rot_insert: [1.0, 1.0, 2.0]
  insert_force_z: 8.0                    # N, constant downward insertion force

  gravity_comp: true
  max_torque: 87.0                       # Nm

gripper:
  open_ctrl: 255.0
  close_ctrl: 76.0
  close_speed_ctrl_per_step: 5.0        # ctrl units per sim step

operational_space_controller:
  # Free-space gains (trajectory tracking)
  kp_pos_free: [300.0, 300.0, 300.0]    # N/m
  kd_pos_free: [30.0, 30.0, 30.0]       # N·s/m
  kp_rot_free: [30.0, 30.0, 30.0]       # N·m/rad
  kd_rot_free: [3.0, 3.0, 3.0]

  # Insertion gains (LCS-MPC insertion + fallback)
  kp_pos_insert: [80.0, 80.0, 50.0]
  kd_pos_insert: [15.0, 15.0, 10.0]
  kp_rot_insert: [10.0, 10.0, 20.0]
  kd_rot_insert: [1.0, 1.0, 2.0]
  insert_force_z: 8.0                    # N, constant downward fallback

  # Recovery gains (retract/search, gentler than free_space)
  kp_pos_recovery: [150.0, 150.0, 150.0]
  kd_pos_recovery: [20.0, 20.0, 20.0]
  kp_rot_recovery: [20.0, 20.0, 20.0]
  kd_rot_recovery: [2.0, 2.0, 2.0]

  max_torque: 87.0

  # Dynamics-aware inertia shaping
  dynamics_aware: true   # Lambda=(J M^{-1} J^T)^{-1} inertia shaping
  lambda_eps: 0.001      # regularization added to (J M^{-1} J^T) before inversion

  # IK parameters (match position_controller defaults)
  kp_ik: 20.0
  kr_ik: 5.0
  lam_ik: 0.01
  lookahead: 0.30
